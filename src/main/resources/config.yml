# Shears durability cost for each lock/unlock action.
# 0 = no durability consumed
# 0.5 = 50% chance to consume 1 durability
# 1 = always consume 1 durability
# 1.75 = always consume 1 durability, plus 75% chance to consume 1 extra
shears-durability-cost: 0.0

messages:
  disable-growth: "&cLocked &f%plant%."
  enable-growth: "&aUnlocked &f%plant%."
  lock-removed: "&eLock removed for &f%plant%&e."
  explosion-locks-removed: "&eRemoved &f%count%&e lock(s) from explosion damage &7(&f%types%&7)."
  locked-protection-break: "&cThis &f%plant%&c is locked and can't be broken. Unlock it with shears first."
  locked-protection-trample: "&cThis &f%plant%&c is locked and can't be trampled. Unlock it with shears first."
  locked-protection-harvest: "&cThis &f%plant%&c is locked and can't be harvested. Unlock it with shears first."
  bonemeal-locked: "&cThis &f%plant%&c is locked and can't be grown with bonemeal. Unlock it with shears first."
  break-bypass-enabled: "&eBreak protection bypass enabled for your session."
  break-bypass-disabled: "&aBreak protection bypass disabled for your session."
