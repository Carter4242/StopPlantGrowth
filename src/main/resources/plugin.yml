name: StopPlantGrowth
version: '1.0.0'
main: io.github.aplini.StopPlantGrowth.StopPlantGrowth
api-version: '1.21'
authors: [ ApliNi ]
website: https://github.com/aplini/
description: Toggle growth locking for vines and other vertical plants using shears.

commands:
  spg:
    description: Main command for StopPlantGrowth.
    usage: /spg <reload|chunk|stats [radius]|clear <chunks|blocks> [radius] [type]>
    aliases: [stopplantgrowth]

permissions:

  StopPlantGrowth.reload:
    description: Reloads StopPlantGrowth configuration.
    default: op

  StopPlantGrowth.chunk:
    description: Lists locked plants in the player's current chunk.
    default: op

  StopPlantGrowth.stats:
    description: Shows lock statistics around the player with an optional radius from 1 to 9.
    default: op

  StopPlantGrowth.clear:
    description: Clears locked plants by chunk or block radius with optional material type.
    default: op

  StopPlantGrowth.breakbypass:
    description: Toggles session-only bypass for crop break protection.
    default: op
